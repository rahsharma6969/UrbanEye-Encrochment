<!DOCTYPE html>
<html>
<head>
    <title>UrbanEye - Urban Change Detection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">🌆 UrbanEye</h1>
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Analysis Parameters</h5>
                        <form id="analysisForm">
                            <div class="mb-3">
                                <label>Preset Locations</label>
                                <select class="form-select" id="locationSelect">
                                    <option value="">Custom Location</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Location Coordinates</label>
                                <div class="row">
                                    <div class="col">
                                        <input type="number" step="0.0001" class="form-control" id="lat_min" placeholder="Min Latitude" required>
                                    </div>
                                    <div class="col">
                                        <input type="number" step="0.0001" class="form-control" id="lon_min" placeholder="Min Longitude" required>
                                    </div>
                                </div>
                                <div class="row mt-2">
                                    <div class="col">
                                        <input type="number" step="0.0001" class="form-control" id="lat_max" placeholder="Max Latitude" required>
                                    </div>
                                    <div class="col">
                                        <input type="number" step="0.0001" class="form-control" id="lon_max" placeholder="Max Longitude" required>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label>Time Period</label>
                                <div class="row">
                                    <div class="col">
                                        <input type="date" class="form-control" id="start_date" required>
                                    </div>
                                    <div class="col">
                                        <input type="date" class="form-control" id="end_date" required>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Analyze Changes</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div id="results" style="display: none;">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Results</h5>
                            <img id="resultImage" class="img-fluid mb-3">
                            <div id="report" class="border p-3 bg-light"></div>
                        </div>
                    </div>
                </div>
                <div id="loading" style="display: none;">
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2">Analyzing changes...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
