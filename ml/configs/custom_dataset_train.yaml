/custom_dataset_train.yaml

# configs/custom_dataset_train.yaml
encoder: resnet34
in_channels: 6
num_classes: 2
batch_size: 4
epochs: 50
lr: 0.0002
weight_decay: 5e-5

train_index: data/Prepared_Dataset/chips_256/index.parquet
val_index: data/Prepared_Dataset/chips_256/index.parquet

criterion: focal_dice_hybrid
focal_alpha: [0.1, 50.0]
focal_gamma: 3.0
ce_weight: 0.5
dice_weight: 0.5
ignore_index: 255

oversample_positive: true
oversample_factor: 20.0

scheduler:
  name: reduce_on_plateau
  params:
    mode: min
    patience: 8
    factor: 0.5
    min_lr: 1e-6

device: auto
amp: false
seed: 42

paths:
  outputs_dir: outputs
  checkpoints_dir: outputs/checkpoints
  logs_dir: outputs/logs

default_threshold: 0.25
vis_threshold: 0.25
vis_min_area: 20