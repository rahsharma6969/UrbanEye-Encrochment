# configs/svcd_train_safe.yaml
data:
  type: SVCD_Dataset
  img_dir: data/chips_256
  ann_dir: data/chips_256
  sub_dir_1: A
  sub_dir_2: B
  img_suffix: .png
  seg_map_suffix: .png

model:
  encoder: resnet34
  encoder_weights: imagenet
  in_channels: 6
  num_classes: 2

  # Training hyperparams (safe, fairly conservative)
  lr: 1e-4
  batch_size: 4
  epochs: 8
  weight_decay: 5e-5

  # Loss & sampling (balanced)
  use_focal: true
  focal_alpha: [1.0, 4.0]
  focal_gamma: 2.0

  oversample_positive: true
  oversample_factor: 3.0   # gentle oversampling

  ce_weight: 0.6
  dice_weight: 0.4

  default_threshold: 0.4
  vis_threshold: 0.5
  val_fraction: 0.15

  amp: false
  max_class_weight: 50.0
  monitor_metric: "f1"

paths:
  outputs_dir: outputs
  checkpoints_dir: outputs/checkpoints
  logs_dir: outputs/logs

scheduler:
  type: reduce
  patience: 4
  factor: 0.5
  min_lr: 1e-6
