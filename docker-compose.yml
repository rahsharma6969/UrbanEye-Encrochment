version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: urbaneye_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: urbaneye_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urbaneye_backend
    env_file: .env
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: ["uvicorn","main:app","--host","0.0.0.0","--port","8000","--reload"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: urbaneye_frontend
    env_file: .env
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: ["pnpm","dev","--host","0.0.0.0"]
    depends_on:
      - backend

  ml-dev:
    build:
      context: ./ml
      dockerfile: Dockerfile       # CPU image by default
    container_name: urbaneye_ml
    env_file: .env
    working_dir: /app
    volumes:
      - ./ml:/app                  # keep code/data/outputs on your host
    tty: true
    stdin_open: true
    # no ports exposed; we run CLI steps via `docker compose exec ml-dev ...`

  # Optional: titiler to serve rasters/COGs as map tiles (handy later)
  # titiler:
  #   image: ghcr.io/developmentseed/titiler:latest
  #   container_name: urbaneye_titiler
  #   ports: ["8080:80"]
  #   depends_on:
  #     - backend

volumes:
  db_data:

